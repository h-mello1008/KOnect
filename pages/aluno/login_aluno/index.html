<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>LOGIN ALUNO</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

</head>
<body>
    <!-- ════════════════════════════════════
     PÁGINA 4 — LOGIN ALUNO
════════════════════════════════════ -->
  <form id="formLoginAluno">
    <div id="pg-login-aluno" class="page">
      <div class="login-wrap">
        <div class="login-box">
          <div class="login-icon" style="background:rgba(34,197,94,.15);">
            <i class="bi bi-mortarboard-fill" style="color:var(--green)"></i>
          </div>
          <h2>Portal do Aluno</h2>
          <p class="sub">Continue aprendendo hoje!</p>
          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-control" id="emailLogin" placeholder="aluno@konect.com"/>
          </div>
          <div class="mb-4">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" id="senhaLogin" placeholder="••••••••"/>
          </div>
          <button type="submit" class="btn btn-danger px-5 fw-bold">
            Entrar  
          </button>
          <div class="back-link">
            <a href="../../index.html""><i class="bi bi-arrow-left me-1"></i>Voltar ao início</a>
          </div>
        </div>
      </div>
    </div>
  </form>

  <script src="./js/login_aluno.js"></script>

</body>
</html>
