<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>LOGIN ALUNO</title>
</head>
<body>
    <!-- ════════════════════════════════════
     PÁGINA 4 — LOGIN ALUNO
════════════════════════════════════ -->
<div id="pg-login-aluno" class="page">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-icon" style="background:rgba(34,197,94,.15);">
        <i class="bi bi-mortarboard-fill" style="color:var(--green)"></i>
      </div>
      <h2>Portal do Aluno</h2>
      <p class="sub">Continue aprendendo hoje!</p>
      <div class="mb-3">
        <label class="form-label">E-mail</label>
        <input type="email" class="form-control" placeholder="aluno@konect.com"/>
      </div>
      <div class="mb-4">
        <label class="form-label">Senha</label>
        <input type="password" class="form-control" placeholder="••••••••"/>
      </div>
      <button class="btn-danger-custom btn-green" onclick="go('pg-dash-aluno')">Entrar como Aluno</button>
      <div class="back-link"><a onclick="go('pg-home')"><i class="bi bi-arrow-left me-1"></i>Voltar ao início</a></div>
    </div>
  </div>
</div><!-- /pg-login-aluno -->
</body>
</html>
