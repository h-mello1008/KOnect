<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KOnect - Cadastrar Novo Aluno</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css">

</head>
<body>

  <nav class="topnav py-3">
    <div class="container d-flex align-items-center justify-content-between">
      <span class="brand">KO<span>nect</span></span>
      <a href="../../index.html" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i> Voltar ao Painel
      </a>
    </div>
  </nav>

  <main class="container px-3">
    <div class="form-container">
      
      <div class="d-flex align-items-center gap-3 mb-4">
        <div style="background:rgba(225, 29, 72, 0.15); color:var(--danger); padding: 12px; border-radius: 12px;">
          <i class="bi bi-person-plus-fill fs-4"></i>
        </div>
        <div>
          <h2 class="mb-0 fw-bold">Novo Aluno</h2>
          <p class="text-white mb-0">Insira os dados do aluno para matriculá-lo em uma turma.</p>
        </div>
      </div>

      <hr style="border-color: var(--border); margin-bottom: 2rem;">

      <form id="formCadastroAluno">
        
        <h5 class="text-white mt-3 mb-3 border-bottom border-secondary pb-2">Dados Pessoais</h5>
        <div class="row g-4">
          
          <div class="col-md-6">
            <label class="form-label">Nome completo</label>
            <input type="text" class="form-control" name="nome" placeholder="Ex.: Ana Souza" required/>
          </div>

          <div class="col-md-6">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-control" name="email" placeholder="aluno@email.com" required/>
          </div>

          <div class="col-md-4">
            <label class="form-label">Senha de Acesso</label>
            <input type="password" class="form-control" name="senha" placeholder="Senha" required/>
          </div>

          <div class="col-md-4">
            <label class="form-label">Telefone</label>
            <input type="tel" class="form-control" name="telefone" placeholder="(00) 90000-0000"/>
          </div>

          <div class="col-md-4">
            <label class="form-label">Rede Social</label>
            <input type="url" class="form-control" name="instagram" placeholder="https://instagram.com/..."/>
          </div>
          
          <div class="col-md-4">
            <label class="form-label">Data de Nascimento</label>
            <input type="date" class="form-control" name="data_nascimento" required/>
          </div>

        </div>

        <h5 class="text-white mt-5 mb-3 border-bottom border-secondary pb-2">Perfil e Treino</h5>
        <div class="row g-4">

          <div class="col-md-3">
            <label class="form-label">Peso Atual kg</label>
            <input type="number" class="form-control" name="peso" min="30" max="200" step="0.1" placeholder="Ex: 75.5"/>
          </div>

          <div class="col-md-3">
            <label class="form-label">Horário Preferencial</label>
            <input type="time" class="form-control" name="horario_treino"/>
          </div>

          <div class="col-md-2">
            <label class="form-label">Cor da Tag</label>
            <input type="color" class="form-control form-control-color w-100" name="cor_identificacao" value="#e11d48" title="Escolha a cor de identificação do aluno"/>
          </div>

          <div class="col-md-4 d-flex flex-column justify-content-center">
            <label class="form-label d-flex justify-content-between">
              Condicionamento Físico 
              <span id="valorNivel" class="fw-bold" style="color: var(--accent);">5</span> 
            </label>
            <input type="range" class="form-range" name="nivel_condicionamento" min="1" max="10" step="1" id="rangeNivel" value="5">
            <div class="d-flex justify-content-between text-muted" style="font-size: 0.75rem;">
              <span>Iniciante</span>
              <span>Atleta</span>
            </div>
          </div>

          <div class="col-12">
            <label class="form-label">Atestado Médico</label>
            <input type="file" class="form-control" name="atestado_medico" accept="application/pdf, image/*"/>
          </div>

        </div>

        <h5 class="text-white mt-5 mb-3 border-bottom border-secondary pb-2">Matrícula</h5>
        <div class="row g-4 align-items-end">

          <div class="col-md-4">
            <label class="form-label">Mês de Início</label>
            <input type="month" class="form-control" name="mes_inicio"/>
          </div>

          <div class="col-md-4">
            <label class="form-label d-block mb-3">Plano Escolhido</label>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="plano" id="planoMensal" value="mensal" checked>
              <label class="form-check-label text-white" for="planoMensal">Mensal</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="plano" id="planoAnual" value="anual">
              <label class="form-check-label text-white" for="planoAnual">Anual</label>
            </div>
          </div>

          <div class="col-md-4">
             <div class="form-check mt-2">
              <input class="form-check-input" type="checkbox" name="aceite_termos" id="termos" value="aceito" required>
              <label class="form-check-label text-white" for="termos">
                Li e aceito os termos
              </label>
            </div>
          </div>

          <div class="col-12 mt-5 d-flex gap-3 justify-content-end border-top pt-4" style="border-color: var(--border) !important;">
            <button type="button" class="btn btn-outline-secondary px-4" onclick="history.back()">
              Cancelar
            </button>
            <button type="submit" class="btn btn-danger px-5 fw-bold">
              <i class="bi bi-check-lg me-1"></i> Salvar
            </button>
          </div>

        </div>
      </form>

    </div>
  </main>

  <script src="./js/cadastro_aluno.js"></script>
  
</body>
</html>
