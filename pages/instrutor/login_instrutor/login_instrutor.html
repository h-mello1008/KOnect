<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>LOGIN INSTRUTOR</title>
</head>
<body>
    <div id="pg-login-instrutor" class="page">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-icon" style="background:rgba(59,130,246,.15);">
        <i class="bi bi-person-video3" style="color:var(--accent2)"></i>
      </div>
      <h2>Portal Instrutor</h2>
      <p class="sub">Bem-vindo de volta, professor!</p>
      <div class="mb-3">
        <label class="form-label">E-mail</label>
        <input type="email" class="form-control" placeholder="instrutor@konect.com"/>
      </div>
      <div class="mb-4">
        <label class="form-label">Senha</label>
        <input type="password" class="form-control" placeholder="••••••••"/>
      </div>
      <button class="btn-danger-custom" onclick="go('pg-dash-instrutor')">Entrar como Instrutor</button>
      <div class="back-link"><a onclick="go('pg-home')"><i class="bi bi-arrow-left me-1"></i>Voltar ao início</a></div>
    </div>
  </div>
</div>
</body>
</html>
