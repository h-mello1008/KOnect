<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <title>LOGIN ADMIN</title>
</head>
<body>
  <div id="pg-login-admin" class="page">
    <div class="login-wrap">
      <form id="formLoginAdmin">
        <div class="login-box">
          <div class="login-icon">
            <i class="bi bi-shield-fill"></i>
          </div>
          <h2>Portal Admin</h2>
          <p class="sub">Acesso restrito ao administrador</p>

          <div id="msgErro" class="alert alert-danger py-2 px-3 mb-3"></div>

          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" id="emailAdmin" class="form-control" placeholder="admin@konect.com" required/>
          </div>
          <div class="mb-4">
            <label class="form-label">Senha</label>
            <input type="password" id="senhaAdmin" class="form-control" placeholder="••••••••" required/>
          </div>
          <button type="submit" class="btn-primary-custom btn-rose">Entrar como Admin</button>
          <div class="back-link">
            <a href="../../index.html"><i class="bi bi-arrow-left me-1"></i>Voltar ao início</a>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
