<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>LOGIN ADMIN</title>
</head>
<body>
  <div id="pg-login-admin" class="page">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-icon" style="background:rgba(244,63,94,.15);">
        <i class="bi bi-shield-fill" style="color:var(--rose)"></i>
      </div>
      <h2>Portal Admin</h2>
      <p class="sub">Acesso restrito ao administrador</p>
      <div class="mb-3">
        <label class="form-label">E-mail</label>
        <input type="email" class="form-control" placeholder="admin@konect.com"/>
      </div>
      <div class="mb-4">
        <label class="form-label">Senha</label>
        <input type="password" class="form-control" placeholder="••••••••"/>
      </div>
      <button class="btn-danger-custom btn-rose" onclick="go('pg-dash-admin')">Entrar como Admin</button>
      <div class="back-link"><a onclick="go('pg-home')"><i class="bi bi-arrow-left me-1"></i>Voltar ao início</a></div>
    </div>
  </div>
</div><!-- /pg-login-admin -->
</body>
</html>
